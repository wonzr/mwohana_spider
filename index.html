<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>mwo_hana.spider</title>
<!--
  PRIVACY NOTE / 개인정보 안내
  ------------------------------------------------------------------
  - 카메라 영상은 100% 브라우저 안에서만 처리됩니다.
  - 어떤 프레임/좌표도 외부 서버로 전송(fetch/upload/websocket)하지 않습니다.
  - 인터넷은 "라이브러리(p5, ml5)와 손 인식 모델을 처음 1회 내려받는 용도"로만 사용됩니다.
    => 이것은 '다운로드'이며, 사용자의 카메라 데이터를 '업로드'하는 것이 아닙니다.
  ------------------------------------------------------------------
-->
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
<style>
  :root { --bg: #050a1e; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    color: #cfeaff;
  }
  canvas { display: block; position: fixed; top: 0; left: 0; }

  /* 시작 / 상태 오버레이 */
  #overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    text-align: left;
    padding-left: clamp(28px, 8vw, 120px);
    padding-right: 24px;
    background:
      radial-gradient(1200px 600px at 50% 30%, rgba(0,255,255,0.08), transparent 60%),
      radial-gradient(900px 500px at 50% 70%, rgba(255,0,220,0.08), transparent 60%),
      #04081a;
    transition: opacity 0.6s ease;
  }
  #overlay h1 {
    font-size: clamp(44px, 9vw, 104px);
    letter-spacing: 0.16em;
    margin: 0 0 6px;
    color: #ff5fdc;
    text-shadow: 0 0 22px rgba(255,0,220,0.75), 0 0 50px rgba(255,0,220,0.4);
  }
  #overlay .credit {
    font-size: clamp(12px, 1.6vw, 15px);
    letter-spacing: 0.2em;
    color: #9fb4d8;
    opacity: 0.85;
    margin-bottom: 26px;
  }
  #overlay ul {
    list-style: none; padding: 0; margin: 0 0 28px;
    font-size: 13px; line-height: 1.9; opacity: 0.85;
  }
  #startBtn {
    cursor: pointer;
    padding: 14px 34px;
    font-family: inherit;
    font-size: 15px;
    letter-spacing: 0.25em;
    color: #00ffff;
    background: rgba(0, 255, 255, 0.06);
    border: 1px solid rgba(0, 255, 255, 0.6);
    border-radius: 4px;
    text-shadow: 0 0 12px rgba(0,255,255,0.9);
    box-shadow: 0 0 24px rgba(0,255,255,0.25), inset 0 0 20px rgba(0,255,255,0.08);
    transition: all 0.2s ease;
  }
  #startBtn:hover {
    background: rgba(0, 255, 255, 0.16);
    box-shadow: 0 0 40px rgba(0,255,255,0.5), inset 0 0 30px rgba(0,255,255,0.15);
    transform: translateY(-1px);
  }
  #status { margin-top: 22px; font-size: 12px; opacity: 0.7; min-height: 16px; }
  #status.err { color: #ff6b6b; opacity: 1; text-shadow: 0 0 12px rgba(255,0,0,0.5); }
  .priv { margin-top: 30px; font-size: 10px; opacity: 0.45; max-width: 420px; line-height: 1.6; }
</style>
</head>
<body>
  <div id="overlay">
    <h1>SPIDER</h1>
    <div class="credit">하나진 Hanajin</div>
    <ul>
      <li>1. 카메라 권한을 허용하세요</li>
      <li>2. 양손을 보이면 거미줄이 생겨요!</li>
      <li>3. 재밌게 놀기!!</li>
    </ul>
    <button id="startBtn">시작하기</button>
    <div id="status">모델 로딩 중..</div>
    <div class="priv">
      카메라 영상은 브라우저 안에서만 처리되며 외부 서버로 전송되지 않습니다.<br>
      (인터넷은 라이브러리/모델 최초 다운로드에만 사용)
    </div>
  </div>

<script>
/* =========================================================================
   NEON CAT'S CRADLE
   - ml5.js HandPose (로컬 추론) + p5.js
   - 카메라 프레임은 외부로 전송하지 않음 (전부 클라이언트 처리)
   ========================================================================= */

let handPose;          // ml5 모델
let video;             // p5 캡처(MediaElement)
let hands = [];        // 최신 인식 결과
let started = false;   // 시작 버튼을 눌렀는지
let modelReady = false;
let loopStartMs = 0;   // 양손이 처음 잡힌 순간의 색 변화 기준 시각
let hadTwoHands = false;

// 화면 좌표 변환용(매 프레임 계산: cover 방식)
let cover = { scale: 1, offsetX: 0, offsetY: 0, vw: 640, vh: 480 };

// 파티클(손끝이 맞닿을 때 폭발)
let particles = [];

// 손끝 랜드마크 인덱스 (MediaPipe Hands 규약)
const TIPS = [4, 8, 12, 16, 20];
// 각 손가락 중간 마디(엄지 MCP, 나머지 PIP) — 손끝 외 추가 거미줄 시작점
const MIDS = [2, 6, 10, 14, 18];
// 손목과 손바닥 시작점 — 연결망 밀도를 살짝 높이는 추가 거미줄
const PALM_POINTS = [0, 5, 9, 13, 17];

// 한 손의 뼈대 연결 정보
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],          // 엄지
  [0,5],[5,6],[6,7],[7,8],          // 검지
  [5,9],[9,10],[10,11],[11,12],     // 중지
  [9,13],[13,14],[14,15],[15,16],   // 약지
  [13,17],[17,18],[18,19],[19,20],  // 새끼
  [0,17]                            // 손바닥 마감
];

// 거미줄/관절 공통 색 루프: 남색과 적색을 1초마다 즉시 전환
const LOOP_COLS = [
  [38, 40, 109],   // 참고 이미지의 짙은 파랑
  [116, 40, 37],   // 참고 이미지의 짙은 빨강
];
const COLOR_HOLD = 1.25;  // 각 색 유지 시간(초)

/* 두 색을 섞지 않고 유지 시간이 끝나는 순간 바로 바꾼다. */
function loopColorAt(t) {
  const i = Math.floor(t / COLOR_HOLD) % LOOP_COLS.length;
  return LOOP_COLS[i];
}

/* 모든 선이 같은 순간에 같은 색으로 변한다. */
function fingerColorAt(t) {
  return loopColorAt(t);
}

/* 랜드마크 인덱스 → 손가락 번호(0~4), 손목은 중지로 */
function fingerOfLandmark(i) {
  return i === 0 ? 2 : Math.floor((i - 1) / 4);
}

// 손끝이 맞닿은 상태 추적(파티클 1회만 터지게)
let wasTouching = [false, false, false, false, false];

// 영상 표시 모드: 0=영상 살짝 어둡게, 1=많이 어둡게, 2=영상 숨김(실루엣만)
let videoMode = 0;
let showHUD = true;

/* ml5 모델은 preload 에서 로드 (p5가 로딩 완료까지 대기) */
function preload() {
  // maxHands:2 → 양손 동시 추적
  handPose = ml5.handPose({ maxHands: 2 });
}

function setup() {
  const c = createCanvas(windowWidth, windowHeight);
  c.position(0, 0);
  pixelDensity(1);     // 레티나에서 과도한 렌더 방지(성능)
  modelReady = true;
  setStatus("준비 완료 — 시작하기 를 누르세요");

  document.getElementById("startBtn").addEventListener("click", startExperience);
}

function startExperience() {
  if (started) return;
  setStatus("카메라 권한 요청 중…");

  // 카메라 캡처 시작 — 권한 프롬프트가 여기서 뜸
  video = createCapture(VIDEO, () => {
    // 카메라 스트림 준비 완료
  });
  video.elt.setAttribute("playsinline", "");
  video.hide(); // 원본 <video> 요소는 숨기고 캔버스에 직접 그림

  // ml5 추론 시작(로컬). 결과는 gotHands 로 콜백.
  handPose.detectStart(video, gotHands);

  started = true;

  // 오버레이 페이드아웃
  const ov = document.getElementById("overlay");
  ov.style.opacity = "0";
  setTimeout(() => (ov.style.display = "none"), 650);

  // 카메라가 일정 시간 안 열리면 안내
  setTimeout(() => {
    if (started && (!video.elt.videoWidth || video.elt.videoWidth === 0)) {
      const ov2 = document.getElementById("overlay");
      ov2.style.display = "flex";
      ov2.style.opacity = "1";
      setStatus("카메라를 열 수 없습니다. 권한을 확인하거나, 일부 브라우저는 localhost/https 에서 실행이 필요합니다.", true);
    }
  }, 4500);
}

function gotHands(results) {
  hands = results || [];
}

function setStatus(msg, isErr) {
  const s = document.getElementById("status");
  if (!s) return;
  s.textContent = msg;
  s.className = isErr ? "err" : "";
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

/* 키 토글: V=영상 모드, H=HUD */
function keyPressed() {
  if (key === 'v' || key === 'V') videoMode = (videoMode + 1) % 3;
  if (key === 'h' || key === 'H') showHUD = !showHUD;
}

function draw() {
  background(6, 10, 30); // 깊은 미드나잇 블루

  if (!started) return;

  const ready = video && video.elt && video.elt.videoWidth > 0;
  if (!ready) {
    drawingContext.shadowBlur = 0;
    fill(150, 200, 255, 180);
    textAlign(CENTER, CENTER);
    textSize(16);
    text("카메라 초기화 중…", width / 2, height / 2);
    return;
  }

  // ── 1) cover 변환 계산 (영상이 화면을 꽉 채우도록) ────────────────
  const vw = video.elt.videoWidth;
  const vh = video.elt.videoHeight;
  const sc = Math.max(width / vw, height / vh);
  const dispW = vw * sc;
  const dispH = vh * sc;
  const offsetX = (width - dispW) / 2;
  const offsetY = (height - dispH) / 2;
  cover = { scale: sc, offsetX, offsetY, vw, vh };

  // ── 2) 좌우 반전(거울) 영상 배경 ─────────────────────────────────
  if (videoMode < 2) {
    drawingContext.shadowBlur = 0;
    push();
    translate(offsetX + dispW, offsetY);
    drawingContext.scale(-1, 1); // 거울 반전
    image(video, 0, 0, dispW, dispH);
    pop();
    // 다크 오버레이로 미래적 무드 + 네온 대비
    noStroke();
    fill(6, 10, 30, videoMode === 0 ? 95 : 185);
    rect(0, 0, width, height);
  }

  // ── 3) 화면 좌표로 변환된 손 데이터 만들기 ───────────────────────
  // 손을 화면상의 x 위치로 정렬 → 색/짝 일관성 유지
  const mapped = hands.map((h) => {
    const pts = h.keypoints.map(toScreen);
    let sx = 0;
    for (const p of pts) sx += p.x;
    return { pts, avgX: sx / pts.length };
  });
  mapped.sort((a, b) => a.avgX - b.avgX);

  // 색이 겹쳐도 밝아지지 않도록 일반 합성으로 그린다.
  drawingContext.globalCompositeOperation = 'source-over';

  // 두 손이 처음 잡히는 프레임에 모든 선을 남색으로 동시에 시작한다.
  const hasTwoHands = mapped.length >= 2;
  if (hasTwoHands && !hadTwoHands) loopStartMs = millis();
  if (!hasTwoHands) loopStartMs = 0;
  hadTwoHands = hasTwoHands;
  const tNow = hasTwoHands && loopStartMs > 0 ? (millis() - loopStartMs) / 1000 : 0;
  const sharedColor = fingerColorAt(tNow);
  const fcols = [sharedColor, sharedColor, sharedColor, sharedColor, sharedColor];

  // ── 4) 손 뼈대 + 관절(글로우 점) ────────────────────────────────
  for (let i = 0; i < mapped.length; i++) {
    drawSkeleton(mapped[i].pts, fcols);
    drawJoints(mapped[i].pts, fcols);
  }

  // ── 5) 양손이 있으면 손끝끼리 '거미줄' 연결 (5×5 = 25가닥) ───────
  if (mapped.length >= 2) {
    const A = mapped[0].pts;
    const B = mapped[1].pts;

    // 거미줄: 손끝끼리, 모든 가닥이 같은 색으로 동시에 변화
    for (let i = 0; i < TIPS.length; i++) {
      for (let j = 0; j < TIPS.length; j++) {
        drawWire(A[TIPS[i]], B[TIPS[j]], fcols[i], fcols[j]);
      }
    }
    // 각 손가락 중간 마디끼리도 연결 (5가닥씩 추가)
    for (let i = 0; i < TIPS.length; i++) {
      for (let j = 0; j < TIPS.length; j++) {
        drawWire(A[MIDS[i]], B[MIDS[j]], fcols[i], fcols[j]);
      }
    }
    // 손목과 손바닥 시작점끼리 5가닥 추가
    for (let i = 0; i < PALM_POINTS.length; i++) {
      const p = PALM_POINTS[i];
      drawWire(A[p], B[p], sharedColor, sharedColor);
    }

    // 대응하는 손끝이 맞닿으면 파티클 폭발
    for (let k = 0; k < TIPS.length; k++) {
      const a = A[TIPS[k]];
      const b = B[TIPS[k]];
      handleTouch(k, a, b, dist(a.x, a.y, b.x, b.y), fcols[k]);
    }
  } else {
    // 한 손일 때 터치 상태 리셋
    for (let k = 0; k < 5; k++) wasTouching[k] = false;
  }

  // ── 6) 파티클 갱신/렌더 ──────────────────────────────────────────
  updateParticles();

  // 가산 합성 종료
  drawingContext.globalCompositeOperation = 'source-over';

  // ── 7) HUD ───────────────────────────────────────────────────────
  drawingContext.shadowBlur = 0;
  if (showHUD) drawHUD(mapped.length);
}

/* 영상 좌표(반전 포함)를 화면 좌표로 */
function toScreen(kp) {
  return {
    x: cover.offsetX + (cover.vw - kp.x) * cover.scale, // 거울 반전
    y: cover.offsetY + kp.y * cover.scale,
    z: kp.z
  };
}

/* 한 손의 뼈대 그리기 — 각 마디를 손가락 색으로 (fcols: 손가락별 현재 색) */
function drawSkeleton(pts, fcols) {
  const ctx = drawingContext;
  ctx.lineWidth = 1.55;
  ctx.lineCap = "round";
  for (const [a, b] of CONNECTIONS) {
    if (!pts[a] || !pts[b]) continue;
    const col = fcols[fingerOfLandmark(Math.max(a, b))]; // 끝 마디 기준 색
    ctx.strokeStyle = rgba(col, 0.95);
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

/* 관절(랜드마크) 네온 점 — 손가락별 색, 모든 점 동일 크기 */
function drawJoints(pts, fcols) {
  const ctx = drawingContext;
  noStroke();
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    const col = fcols[fingerOfLandmark(i)];
    ctx.shadowBlur = 0;
    fill(col[0], col[1], col[2], 245);
    circle(p.x, p.y, 7);
  }
}

/* 두 색 선형 보간 */
function lerpCol(a, b, k) {
  return [a[0] + (b[0] - a[0]) * k, a[1] + (b[1] - a[1]) * k, a[2] + (b[2] - a[2]) * k];
}

/* 거미줄 한 가닥 — 양끝 손가락 색을 잇는, 팽팽하게 당겨진 얇은 직선 */
function drawWire(a, b, colA, colB) {
  const ctx = drawingContext;
  const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
  grad.addColorStop(0, rgba(colA, 1));
  grad.addColorStop(1, rgba(colB, 1));

  ctx.lineCap = "round";

  // 참고 이미지 색을 그대로 보여주는 단색 본선
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1.35;
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

/* 손끝이 맞닿으면 파티클 폭발(전환 시 1회) */
function handleTouch(idx, a, b, d, col) {
  const touching = d < 38;
  if (touching && !wasTouching[idx]) {
    const cx = (a.x + b.x) / 2;
    const cy = (a.y + b.y) / 2;
    spawnBurst(cx, cy, col);
  }
  wasTouching[idx] = touching;
}

function spawnBurst(x, y, col) {
  for (let i = 0; i < 14; i++) {
    if (particles.length > 240) break;
    const ang = random(TWO_PI);
    const spd = random(1, 5);
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: 1,
      col
    });
  }
}

function updateParticles() {
  const ctx = drawingContext;
  noStroke();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;     // 약한 중력
    p.vx *= 0.98;
    p.life -= 0.028;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.shadowBlur = 0;
    fill(p.col[0], p.col[1], p.col[2], p.life * 255);
    circle(p.x, p.y, p.life * 7);
  }
  ctx.shadowBlur = 0;
}

function drawHUD(handCount) {
  fill(120, 200, 255, 150);
  textAlign(LEFT, TOP);
  textSize(12);
  const fps = Math.round(frameRate());
  text(`FPS ${fps}   HANDS ${handCount}/2`, 16, 14);
  fill(120, 200, 255, 90);
  textSize(10);
  const vlabel = videoMode === 0 ? "DIM" : (videoMode === 1 ? "DARK" : "SILHOUETTE");
  text(`[V] video: ${vlabel}    [H] HUD`, 16, 32);
}

/* ── 유틸 ───────────────────────────────────────────────────────── */
function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }
</script>
</body>
</html>
